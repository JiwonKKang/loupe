name: release

# Build the macOS app and publish a GitHub Release with the .dmg whenever a
# version tag (v*) is pushed (or run manually). Ad-hoc signed — no Apple
# Developer account — so the Homebrew Cask strips the quarantine flag on
# install and the app launches without the "damaged / unidentified developer"
# block. Universal binary (Apple Silicon + Intel) from one artifact.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  release:
    runs-on: macos-14 # Apple Silicon runner
    permissions:
      contents: write # tauri-action creates the Release + uploads the .dmg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend deps
        run: npm ci

      # Build the universal app. macOS DMG bundling (bundle_dmg.sh runs an
      # AppleScript to lay out the volume window) is flaky on headless runners,
      # so retry the whole build a few times — the compiled .app is cached, so a
      # retry only re-bundles the DMG (seconds). Keeps the run green first try.
      - name: Build (retry — flaky DMG bundling)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 40
          max_attempts: 3
          retry_wait_seconds: 15
          command: npm run tauri build -- --target universal-apple-darwin

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Loupe ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body: |
            Unsigned (ad-hoc) macOS build — install with Homebrew:

                brew install --cask JiwonKKang/loupe/loupe

            Or open the `.dmg` directly. On first launch macOS may warn it is
            from an unidentified developer — right-click the app → **Open**, or:

                xattr -dr com.apple.quarantine /Applications/Loupe.app
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
